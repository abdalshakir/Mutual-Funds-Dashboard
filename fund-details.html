<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund Details - Sarmaaya Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stat-card {
            position: relative;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent,
                transparent,
                transparent,
                var(--border-color)
            );
            animation: rotateBorder 4s linear infinite;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
            border-radius: 10px;
        }

        .stat-card > div {
            position: relative;
            z-index: 1;
        }

        .stat-card.green {
            --border-color: #10b981;
            --bg-from: #d1fae5;
            --bg-to: #ffffff;
        }

        .stat-card.blue {
            --border-color: #3b82f6;
            --bg-from: #dbeafe;
            --bg-to: #ffffff;
        }

        .stat-card.purple {
            --border-color: #8b5cf6;
            --bg-from: #f3e8ff;
            --bg-to: #ffffff;
        }

        .sector-card {
            transition: all 0.3s ease;
        }

        .sector-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .company-row {
            transition: all 0.2s ease;
        }

        .company-row:hover {
            background: linear-gradient(to right, #f0f9ff, #fef3c7);
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center gap-2 text-gray-700 hover:text-gray-900 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    <span class="font-semibold">Back to Dashboard</span>
                </a>
                <div class="text-xl font-bold text-gray-800">Fund Details</div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Loading State -->
        <div id="loadingState" class="space-y-6">
            <div class="loading-shimmer h-32 rounded-xl"></div>
            <div class="loading-shimmer h-48 rounded-xl"></div>
            <div class="loading-shimmer h-64 rounded-xl"></div>
        </div>

        <!-- Fund Details Content -->
        <div id="fundContent" class="hidden space-y-6">
            <!-- Fund Header -->
            <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
                <div class="flex items-start justify-between">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-3">
                            <span id="fundShariah" class="hidden text-2xl">🕌</span>
                            <h1 id="fundName" class="text-3xl font-bold text-gray-800">-</h1>
                        </div>
                        <div class="flex flex-wrap gap-4 text-sm text-gray-600">
                            <div>
                                <span class="font-medium">Fund ID:</span>
                                <span id="fundId" class="ml-1">-</span>
                            </div>
                            <div>
                                <span class="font-medium">Type:</span>
                                <span id="fundType" class="ml-1">-</span>
                            </div>
                            <div>
                                <span class="font-medium">AMC:</span>
                                <span id="fundAmc" class="ml-1">-</span>
                            </div>
                        </div>
                    </div>
                    <div id="fundRiskBadge" class="px-4 py-2 rounded-full text-sm font-semibold">-</div>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- NAV Stat -->
                <div class="stat-card green rounded-xl p-4 shadow-sm">
                    <div class="text-center">
                        <div class="bg-green-100 rounded-full p-2 inline-flex mb-2">
                            <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                        <div class="text-green-600 text-xs font-medium mb-1">NAV</div>
                        <div class="text-gray-800 text-xl font-bold" id="fundNav">-</div>
                    </div>
                </div>

                <!-- 1D Change Stat -->
                <div class="stat-card blue rounded-xl p-4 shadow-sm">
                    <div class="text-center">
                        <div class="bg-blue-100 rounded-full p-2 inline-flex mb-2">
                            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                            </svg>
                        </div>
                        <div class="text-blue-600 text-xs font-medium mb-1">1D Change</div>
                        <div class="text-xl font-bold" id="fund1DChange">-</div>
                    </div>
                </div>

                <!-- AUM Stat -->
                <div class="stat-card purple rounded-xl p-4 shadow-sm">
                    <div class="text-center">
                        <div class="bg-purple-100 rounded-full p-2 inline-flex mb-2">
                            <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                            </svg>
                        </div>
                        <div class="text-purple-600 text-xs font-medium mb-1">AUM</div>
                        <div class="text-xl font-bold text-gray-800" id="fundAum">-</div>
                    </div>
                </div>

                <!-- Fund Change Stat -->
                <div class="stat-card green rounded-xl p-4 shadow-sm">
                    <div class="text-center">
                        <div class="bg-green-100 rounded-full p-2 inline-flex mb-2">
                            <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path>
                            </svg>
                        </div>
                        <div class="text-green-600 text-xs font-medium mb-1">Fund Change</div>
                        <div class="text-xl font-bold" id="fundChangePercent">-</div>
                    </div>
                </div>
            </div>

            <!-- Portfolio Composition -->
            <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">Portfolio Composition by Sector</h2>
                <div id="sectorsContainer" class="space-y-4">
                    <!-- Sectors will be inserted here -->
                </div>
            </div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden">
            <div class="bg-white rounded-xl border border-red-200 p-12 text-center">
                <div class="text-6xl mb-4">❌</div>
                <h3 class="text-2xl font-bold text-gray-800 mb-2">Failed to load fund details</h3>
                <p class="text-gray-500 mb-4" id="errorMessage">Something went wrong</p>
                <a href="index.html" class="inline-block px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                    Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    <script>
        let fundData = null;
        let sunburstData = null;

        // Get fundId from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const fundId = urlParams.get('fundId');
        const fundDataParam = urlParams.get('fund');

        if (!fundId) {
            showError('No fund ID provided');
        } else {
            // Parse fund data if passed
            if (fundDataParam) {
                try {
                    fundData = JSON.parse(decodeURIComponent(fundDataParam));
                } catch (e) {
                    console.error('Error parsing fund data:', e);
                }
            }
            
            loadFundDetails();
        }

        async function loadFundDetails() {
            try {
                // Load sunburst data
                const response = await fetch(`/.netlify/functions/fund-sunburst?fundId=${fundId}`);
                const data = await response.json();

                if (data.success && data.response) {
                    sunburstData = data.response;
                    renderFundDetails();
                } else {
                    throw new Error('Invalid response from API');
                }
            } catch (error) {
                console.error('Error loading fund details:', error);
                showError(error.message);
            }
        }

        function renderFundDetails() {
            // Hide loading, show content
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('fundContent').classList.remove('hidden');

            // Render fund header
            if (fundData) {
                document.getElementById('fundName').textContent = fundData.name || sunburstData.mutualFundName;
                document.getElementById('fundId').textContent = fundData.fundId || fundId;
                document.getElementById('fundType').textContent = fundData.fundType || 'Mutual Fund';
                document.getElementById('fundAmc').textContent = fundData.amcName || '-';

                // Show Islamic icon if Shariah compliant
                if (fundData.isShariah) {
                    document.getElementById('fundShariah').classList.remove('hidden');
                }

                // Risk badge
                const riskBadge = document.getElementById('fundRiskBadge');
                const riskClass = 
                    fundData.riskProfile === 'Low' ? 'bg-green-100 text-green-700' :
                    fundData.riskProfile === 'Medium' ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700';
                riskBadge.className = `px-4 py-2 rounded-full text-sm font-semibold ${riskClass}`;
                riskBadge.textContent = `${fundData.riskProfile} Risk`;

                // Stats
                document.getElementById('fundNav').textContent = parseFloat(fundData.nav || 0).toFixed(4);
                
                const change1D = parseFloat(fundData.changePercent1d || 0);
                const change1DEl = document.getElementById('fund1DChange');
                change1DEl.textContent = `${change1D >= 0 ? '+' : ''}${change1D.toFixed(2)}%`;
                change1DEl.className = `text-xl font-bold ${change1D >= 0 ? 'text-green-600' : 'text-red-600'}`;

                const aum = parseFloat(fundData.aum || 0);
                let aumFormatted;
                if (aum >= 1000000000) {
                    aumFormatted = `PKR ${(aum / 1000000000).toFixed(2)}B`;
                } else if (aum >= 1000000) {
                    aumFormatted = `PKR ${(aum / 1000000).toFixed(2)}M`;
                } else {
                    aumFormatted = `PKR ${(aum / 1000).toFixed(2)}K`;
                }
                document.getElementById('fundAum').textContent = aumFormatted;
            } else {
                document.getElementById('fundName').textContent = sunburstData.mutualFundName;
                document.getElementById('fundId').textContent = fundId;
            }

            // Fund change percent from sunburst
            const fundChange = sunburstData.mutualFundChangePercent || 0;
            const fundChangeEl = document.getElementById('fundChangePercent');
            fundChangeEl.textContent = `${fundChange >= 0 ? '+' : ''}${fundChange.toFixed(2)}%`;
            fundChangeEl.className = `text-xl font-bold ${fundChange >= 0 ? 'text-green-600' : 'text-red-600'}`;

            // Render sectors
            renderSectors();
        }

        function renderSectors() {
            const container = document.getElementById('sectorsContainer');
            
            if (!sunburstData.sectors || sunburstData.sectors.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">No sector data available</p>';
                return;
            }

            container.innerHTML = sunburstData.sectors.map(sector => createSectorCard(sector)).join('');
        }

        function createSectorCard(sector) {
            const companiesHtml = sector.companies.map((company, idx) => `
                <tr class="company-row border-b border-gray-100 last:border-0">
                    <td class="px-4 py-3 text-gray-600">${idx + 1}</td>
                    <td class="px-4 py-3 font-semibold text-gray-800">${company.symbol}</td>
                    <td class="px-4 py-3 text-right text-gray-700">${company.weightage.toFixed(2)}%</td>
                    <td class="px-4 py-3 text-right font-semibold ${company.changePercent >= 0 ? 'text-green-600' : 'text-red-600'}">
                        ${company.changePercent >= 0 ? '+' : ''}${company.changePercent.toFixed(2)}%
                    </td>
                    <td class="px-4 py-3 text-right text-gray-600">${formatNumber(company.volume)}</td>
                    <td class="px-4 py-3 text-right text-gray-700">PKR ${formatNumber(company.marketValue)}</td>
                </tr>
            `).join('');

            return `
                <div class="sector-card bg-gradient-to-br from-gray-50 to-white rounded-xl border border-gray-200 p-5">
                    <!-- Sector Header -->
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <h3 class="text-lg font-bold text-gray-800">${sector.sector}</h3>
                            <p class="text-sm text-gray-500">Sector ID: ${sector.sectorId}</p>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold text-blue-600">${sector.sectorWeightage.toFixed(2)}%</div>
                            <div class="text-sm text-gray-500">Weightage</div>
                        </div>
                    </div>

                    <!-- Sector Stats -->
                    <div class="grid grid-cols-3 gap-4 mb-4 p-4 bg-white rounded-lg border border-gray-100">
                        <div class="text-center">
                            <div class="text-xs text-gray-500 mb-1">Change</div>
                            <div class="text-lg font-bold ${sector.sectorChangePercent >= 0 ? 'text-green-600' : 'text-red-600'}">
                                ${sector.sectorChangePercent >= 0 ? '+' : ''}${sector.sectorChangePercent.toFixed(2)}%
                            </div>
                        </div>
                        <div class="text-center border-l border-r border-gray-200">
                            <div class="text-xs text-gray-500 mb-1">Volume</div>
                            <div class="text-lg font-bold text-gray-800">${formatNumber(sector.sectorVolume)}</div>
                        </div>
                        <div class="text-center">
                            <div class="text-xs text-gray-500 mb-1">Market Value</div>
                            <div class="text-lg font-bold text-gray-800">PKR ${formatNumber(sector.sectorMarketValue)}</div>
                        </div>
                    </div>

                    <!-- Companies Table -->
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gradient-to-r from-blue-50 to-indigo-50">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700">#</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700">Symbol</th>
                                    <th class="px-4 py-3 text-right text-xs font-semibold text-gray-700">Weightage</th>
                                    <th class="px-4 py-3 text-right text-xs font-semibold text-gray-700">Change</th>
                                    <th class="px-4 py-3 text-right text-xs font-semibold text-gray-700">Volume</th>
                                    <th class="px-4 py-3 text-right text-xs font-semibold text-gray-700">Market Value</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${companiesHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function formatNumber(num) {
            return new Intl.NumberFormat('en-US').format(num);
        }

        function showError(message) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }
    </script>
</body>
</html>
